       <h1>Pancakes</h1> 
       <p>Super simple pancakes that are quick and delicious. <br>
        You can even make the batter the night before and store <br>
        it in the fridge to make the next morning.</p>
        <h2>How to make</h2>
        <p><strong>Ingredients:</strong></p>
        <p>Dry:</p>
        <ul>
            <li>2 cups AP flour</li>
            <li>3 tbsp sugar</li>
            <li>4 tsp baking powder</li>
            <li>1 tsp salt</li>
            <li>1/2 tsp baking soda</li>
        </ul>
        
    </body>
